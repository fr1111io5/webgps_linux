<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroMAP Navigator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.css" />
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --text: #f8fafc; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Верхняя панель поиска */
        .search-bar {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            z-index: 1000;
            background: rgba(30, 41, 59, 0.9);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input { flex: 1; background: #334155; border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }

        /* Нижняя панель управления */
        .bottom-panel {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 1000;
            background: #1e293b;
            padding: 20px;
            border-radius: 24px 24px 0 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transform: translateY(0);
            transition: transform 0.3s;
        }

        .nav-info { display: flex; justify-content: space-between; align-items: center; color: white; }
        .speed-circle {
            width: 70px; height: 70px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
        }
        .speed-val { font-size: 24px; font-weight: bold; }
        .speed-unit { font-size: 10px; }

        .btn-go {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Скрытие элементов Leaflet */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="search-bar">
        <div style="flex: 1; position: relative;">
            <input type="text" id="search-input" placeholder="Куда едем?" autocomplete="off">
            <div id="search-results" style="position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border-radius: 0 0 8px 8px; display: none; max-height: 200px; overflow-y: auto; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);"></div>
        </div>
        <button id="btn-search" style="background:none; border:none; font-size:20px; cursor: pointer;">🔍</button>
    </div>

    <div class="bottom-panel">
        <div class="nav-info">
            <div id="route-data">
                <div style="font-size: 14px; color: #94a3b8;">Осталось:</div>
                <div id="time-left" style="font-size: 20px; font-weight: bold;">-- мин</div>
                <div id="dist-left" style="font-size: 14px;">-- км</div>
            </div>
            <div class="speed-circle">
                <div class="speed-val" id="current-speed">0</div>
                <div class="speed-unit">км/ч</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-go" id="start-route" style="flex: 2;">Поехали</button>
            <button class="btn-go" id="btn-simulate" style="flex: 1; background: #334155; color: white; font-size: 12px;">Тест</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>
    <script src="user_script.js"></script>
</body>
</html>
